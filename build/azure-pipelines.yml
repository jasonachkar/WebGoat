trigger: 
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build Job'
    steps:
    - script: |
        echo "This would be replaced with build job"
      displayName: 'Building'
- stage: SemGrep
  displayName: 'Run SemGrep'
  jobs:
  - job: Installation
    displayName: 'Installing SemGrep ...'
    steps:
    - script: pip install msal
      displayName: 'Install MSAL'
    - script: |
        python3 -m pip install semgrep
      displayName: 'SemGrep Installation'
    - script: |
        python3 secureobs/semgrep_scan.py $(Build.SourcesDirectory) $(API_SEMGREP_URL) $(TENANT_ID) $(Build.BuildId)
      displayName: 'Running Semgrep'
      env:
        Client_Id: $(Client_Id)
        Client_Secret: $(Client_Secret)

- stage: GitLeaks
  displayName: 'Running GitLeaks ...'
  jobs:
  - job: Installation
    displayName: 'Installing Gitleaks'
    steps:
    - script: pip install msal
      displayName: 'Install MSAL'
    - script: |
        wget https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
        tar -xzf gitleaks_8.21.2_linux_x64.tar.gz
        sudo mv gitleaks /usr/local/bin/gitleaks
      displayName: 'Installing gitleaks ...'
    - script: |
        python3 secureobs/gitleaks_scan.py $(Build.SourcesDirectory) $(API_GITLEAKS_URL) $(Agent.TempDirectory) $(TENANT_ID) $(Build.BuildId)
      displayName: 'Running Gitleaks'
      env:
        Client_Id: $(Client_Id)
        Client_Secret: $(Client_Secret)